<main class="container">
  <h1>DevOps Frontend</h1>
  <p>API base URL: <code>{{ apiBaseUrl }}</code></p>

  <button type="button" (click)="loadUsers()" [disabled]="isLoading">
    {{ isLoading ? 'Loading...' : 'Load users' }}
  </button>

  @if (error) {
    <p class="error">{{ error }}</p>
  }

  @if (users.length) {
    <pre>{{ users | json }}</pre>
  }
</main>
