global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - alert.yml

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api:5005', 'api:3005']

  - job_name: 'orders-service'
    static_configs:
      - targets: ['orders-service:5010', 'orders-service:3010']

  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']

  - job_name: 'orders-mongodb'
    static_configs:
      - targets: ['orders-mongodb-exporter:9216']

