services:
  mongodb:
    image: mongo:latest
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${PROD_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${PROD_DB_PASSWORD}
    volumes:
      - mongo-prod-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - prod-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      - PORT=${API_PORT:-3005}
      - DB_NAME=${DB_NAME:-devops_opdrachten}
      - MONGO_URL=mongodb://${PROD_DB_USER}:${PROD_DB_PASSWORD}@mongodb:27017/${DB_NAME:-devops_opdrachten}?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    expose:
      - "${API_PORT:-3005}"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:' + (process.env.PORT || 3005) + '/', (r)=>process.exit(r.statusCode < 500 ? 0 : 1)).on('error', ()=>process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - prod-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      - API_BASE_URL=${FRONTEND_API_BASE_URL:-/api}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - prod-network

volumes:
  mongo-prod-data:

networks:
  prod-network: