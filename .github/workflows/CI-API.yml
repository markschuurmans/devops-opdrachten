name: 'Jest Code Coverage'
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

defaults:
  run:
    working-directory: ./api

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.JS
        uses: actions/setup-node@v2
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Run ESLint
        run: npm run lint

      - name: Jest Code Coverage
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          working-directory: ./api